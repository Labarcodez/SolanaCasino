[toolchain]
anchor_version = "0.32.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
solcasino = "Be5brMe2AvA68zEdiFKxa6KfYJdeQAeY12eWtZiC41vU"

[programs.devnet]
solcasino = "Be5brMe2AvA68zEdiFKxa6KfYJdeQAeY12eWtZiC41vU"

[programs.mainnet]
solcasino = "Be5brMe2AvA68zEdiFKxa6KfYJdeQAeY12eWtZiC41vU"

[registry]
url = "https://api.apr.dev"

[provider]
