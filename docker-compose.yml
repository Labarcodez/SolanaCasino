services:
  solcasino:
    build:
      context: .
      args:
        VITE_PHANTOM_APP_ID: ${VITE_PHANTOM_APP_ID:-}
        VITE_PROGRAM_ID: ${VITE_PROGRAM_ID:-Be5brMe2AvA68zEdiFKxa6KfYJdeQAeY12eWtZiC41vU}
        VITE_CASINO_WALLET: ${VITE_CASINO_WALLET:-FMmho438Vv1Y9nov4mtfHZ4pYSZV8NfubiCeCB3bbGCb}
        VITE_SOLANA_RPC: ${VITE_SOLANA_RPC:-https://api.devnet.solana.com}
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "3001:3001"
    env_file:
      - backend/.env
    environment:
      - SERVE_FRONTEND=true
      - NODE_ENV=production
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - SOLANA_CLUSTER=${SOLANA_CLUSTER:-devnet}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
    volumes:
      - casino-data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  casino-data:
