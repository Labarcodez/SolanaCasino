services:
  solcasino:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - backend/.env
    environment:
      - SERVE_FRONTEND=true
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:3001
    volumes:
      - casino-data:/app/backend/data
    restart: unless-stopped

volumes:
  casino-data:
