name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: orbit-casino:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.repository != '' # skip forks without secrets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build container in ACR
        run: |
          az acr build \
            --registry "${{ secrets.AZURE_ACR_NAME }}" \
            --image "${{ env.IMAGE_NAME }}" \
            --build-arg VITE_PHANTOM_APP_ID="${{ secrets.VITE_PHANTOM_APP_ID }}" \
            --build-arg VITE_PROGRAM_ID=Be5brMe2AvA68zEdiFKxa6KfYJdeQAeY12eWtZiC41vU \
            --build-arg VITE_CASINO_WALLET=C9W7nGv2ZBJp4zcmtvBHkrtTPhB1FQ7JaNNPRNhiA4Ze \
            --build-arg VITE_SOLANA_RPC=https://solana.drpc.org \
            --build-arg VITE_API_URL="" \
            .

      - name: Restart web app (pull latest image)
        run: |
          az webapp config container set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --container-image-name "${{ secrets.AZURE_ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}" \
            --container-registry-url "https://${{ secrets.AZURE_ACR_NAME }}.azurecr.io"

          az webapp restart \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}"

      - name: Health check
        run: |
          URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health"
          for i in 1 2 3 4 5 6; do
            if curl -sf "$URL" | grep -q '"status":"ok"'; then
              echo "Health check passed: $URL"
              exit 0
            fi
            echo "Waiting for app... ($i/6)"
            sleep 20
          done
          echo "Health check did not pass yet — check App Service logs in Azure Portal"
          exit 1
